<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>meizoCRM – Demo</title>
<style>
  :root{
    --bg:#f5f5f5; --surface:#ffffff; --surface-hover:#fafafa;
    --border:#e8e8e8; --text:#1a1a1a; --text-secondary:#666;
    --text-muted:#999; --text-faint:#ccc; --radius:8px; --radius-lg:12px;
    --shadow-sm:0 1px 2px rgba(0,0,0,0.04);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;font-size:14px;}
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input{font-family:inherit;font-size:inherit;}

  .topbar{
    background:var(--surface);border-bottom:1px solid var(--border);
    padding:12px 20px;display:flex;align-items:center;gap:14px;
  }
  .topbar img{width:24px;height:24px;border-radius:6px;}
  .topbar .brand{font-weight:700;font-size:15px;}
  .topbar .badge{font-size:10px;color:var(--text-muted);border:1px solid var(--border);border-radius:10px;padding:2px 8px;}
  .topbar input{
    padding:7px 12px;border:1px solid var(--border);border-radius:8px;
    background:var(--bg);color:var(--text);font-size:13px;width:200px;margin-left:auto;
  }
  .topbar input:focus{outline:none;border-color:#1a1a1a;}
  .topbar .count{font-size:12px;color:var(--text-muted);}

  .board{display:flex;gap:12px;padding:20px;overflow-x:auto;align-items:flex-start;}
  .col{width:240px;flex-shrink:0;border-radius:12px;border:2px solid transparent;transition:all .15s;min-height:200px;}
  .col.drag-target{background:rgba(22,163,74,0.05);border-color:#16a34a;}
  .col-head{padding:12px 14px;display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .col-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .col-label{font-size:13px;font-weight:700;flex:1;}
  .col-count{font-size:12px;font-weight:600;color:var(--text-muted);background:var(--surface);
    border:1px solid var(--border);border-radius:99px;padding:1px 7px;}
  .col-wv{font-size:11px;color:#d97706;background:#fef3c7;border-radius:99px;padding:1px 6px;}
  .col-body{padding:0 8px 8px;}
  .empty-col{text-align:center;padding:20px 12px;font-size:12px;color:var(--text-faint);
    border:2px dashed var(--border);border-radius:8px;}

  .lead-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;
    padding:10px 12px;margin-bottom:8px;cursor:grab;box-shadow:var(--shadow-sm);transition:opacity .15s;}
  .lead-card.wdv{border-color:#fbbf24;}
  .lead-card.dragging{opacity:.4;}
  .lead-name{font-weight:600;font-size:13px;margin-bottom:4px;}
  .lead-owner{font-size:11px;color:var(--text-muted);margin-bottom:4px;}
  .lead-phone{font-size:12px;color:#378ADD;display:block;margin-bottom:4px;}
  .lead-note{font-size:11px;color:var(--text-secondary);background:var(--bg);border-radius:6px;
    padding:4px 7px;margin-bottom:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;}
  .lead-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
  .tag{font-size:10px;color:var(--text-muted);background:var(--bg);border:1px solid var(--border);
    border-radius:99px;padding:1px 6px;}
  .tag.wdv{color:#92400e;background:#fef3c7;border:none;}

  #note-popup{position:fixed;z-index:9999;background:#111110;border-radius:14px;padding:14px 18px;
    max-width:300px;font-size:13px;line-height:1.6;color:#f5f5f5;
    box-shadow:0 8px 32px rgba(0,0,0,0.22),0 2px 8px rgba(0,0,0,0.12);
    white-space:pre-wrap;word-break:break-word;}
</style>
</head>
<body>

<div class="topbar">
  <img src="logo.png" alt="">
  <div class="brand">meizoCRM</div>
  <span class="badge">Demo</span>
  <input id="search" placeholder="Suchen…">
  <div class="count" id="lead-count"></div>
</div>

<div class="board" id="board"></div>

<script>
(function(){
  "use strict";

  var COLUMNS = [
    { id:"",               label:"Offen",               color:"#6b7280", bg:"#f3f4f6" },
    { id:"NDG",            label:"Nicht Durchgekommen",  color:"#374151", bg:"#f3f4f6" },
    { id:"AP NE",          label:"AP Nicht Erreicht",    color:"#92400e", bg:"#fef3c7" },
    { id:"Info per Email", label:"Info per E-Mail",      color:"#5b21b6", bg:"#ede9fe" },
    { id:"Nur Email",      label:"Nur E-Mail",           color:"#1e40af", bg:"#dbeafe" },
    { id:"Closing Termin", label:"Closing Termin",       color:"#065f46", bg:"#d1fae5" },
    { id:"KI",             label:"Kein Interesse",       color:"#991b1b", bg:"#fee2e2" }
  ];

  function todayStr(){ return new Date().toISOString().slice(0,10); }
  function daysAgo(n){ var d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().slice(0,10); }
  function daysAhead(n){ var d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().slice(0,10); }
  function phone(){ return "01" + (50+Math.floor(Math.random()*40)) + "-" + Math.floor(1000000+Math.random()*8999999); }

  var REPS = ["Meisam", "Elena", "David", ""];
  var NAMES = ["Julia Berger","Thomas König","Sandra Voigt","Markus Lindner","Nina Cordes",
    "Paul Achterberg","Laura Wenzel","Kevin Straub","Melanie Horn","Daniel Peters",
    "Anja Roth","Fabian Kluge","Sophie Lang","Jonas Brandt","Carina Fuchs","Tobias Winkler"];
  var NOTES = [
    "Rückruf nach Feierabend erwünscht.", "Interessiert, möchte Angebot per Mail.",
    "Termin nächste Woche bestätigen.", "War skeptisch, nochmal nachfassen.",
    "Familie zurückgerufen, später nochmal versuchen.", "", "", ""
  ];
  var STATUS_WEIGHTS = ["","","","NDG","NDG","AP NE","AP NE","Info per Email","Nur Email","Closing Termin","KI"];

  var leads = NAMES.map(function(name, i){
    var hasWdv = Math.random() < 0.4;
    return {
      id: "lead-" + i,
      name: name,
      phone: phone(),
      owner: REPS[Math.floor(Math.random()*REPS.length)],
      callNote: NOTES[Math.floor(Math.random()*NOTES.length)],
      callCount: Math.floor(Math.random()*5),
      wiedervorlage: hasWdv ? (Math.random() < 0.5 ? daysAgo(Math.floor(Math.random()*3)) : daysAhead(1+Math.floor(Math.random()*7))) : null,
      status: STATUS_WEIGHTS[Math.floor(Math.random()*STATUS_WEIGHTS.length)]
    };
  });

  var dragging = null;
  var search = "";

  function render(){
    var today = todayStr();
    var board = document.getElementById("board");
    board.innerHTML = "";
    var filtered = search
      ? leads.filter(function(l){ return l.name.toLowerCase().indexOf(search.toLowerCase()) > -1 || l.phone.indexOf(search) > -1; })
      : leads;

    document.getElementById("lead-count").textContent = leads.length + " Leads";

    COLUMNS.forEach(function(col){
      var colLeads = filtered.filter(function(l){ return (l.status || "") === col.id; });
      var wvCount = colLeads.filter(function(l){ return l.wiedervorlage && l.wiedervorlage <= today; }).length;

      var colEl = document.createElement("div");
      colEl.className = "col";
      colEl.dataset.colId = col.id;
      colEl.addEventListener("dragover", function(e){ e.preventDefault(); colEl.classList.add("drag-target"); });
      colEl.addEventListener("dragleave", function(){ colEl.classList.remove("drag-target"); });
      colEl.addEventListener("drop", function(e){
        e.preventDefault();
        colEl.classList.remove("drag-target");
        var id = e.dataTransfer.getData("leadId");
        var lead = leads.find(function(l){ return l.id === id; });
        if (lead) { lead.status = col.id; render(); }
      });

      var head = document.createElement("div");
      head.className = "col-head";
      head.innerHTML =
        '<div class="col-dot" style="background:' + col.color + '"></div>' +
        '<span class="col-label">' + col.label + '</span>' +
        '<span class="col-count">' + colLeads.length + '</span>' +
        (wvCount > 0 ? '<span class="col-wv">' + wvCount + '</span>' : '');
      colEl.appendChild(head);

      var body = document.createElement("div");
      body.className = "col-body";

      if (colLeads.length === 0) {
        var empty = document.createElement("div");
        empty.className = "empty-col";
        empty.textContent = "Hierher ziehen";
        body.appendChild(empty);
      }

      colLeads.forEach(function(lead){
        var isWdv = !!(lead.wiedervorlage && lead.wiedervorlage <= today);
        var card = document.createElement("div");
        card.className = "lead-card" + (isWdv ? " wdv" : "");
        card.draggable = true;
        card.addEventListener("dragstart", function(e){
          e.dataTransfer.setData("leadId", lead.id);
          dragging = lead.id;
          setTimeout(function(){ card.classList.add("dragging"); }, 0);
        });
        card.addEventListener("dragend", function(){ dragging = null; card.classList.remove("dragging"); });

        var html = '<div class="lead-name">' + lead.name + '</div>';
        if (lead.owner) html += '<div class="lead-owner">' + lead.owner + '</div>';
        if (lead.phone) html += '<a href="tel:' + lead.phone + '" class="lead-phone" onclick="event.preventDefault()">' + lead.phone + '</a>';
        if (lead.callNote) html += '<div class="lead-note" data-note="' + lead.callNote.replace(/"/g,'&quot;') + '">' + lead.callNote + '</div>';
        html += '<div class="lead-tags">';
        if (lead.callCount > 0) html += '<span class="tag">📞 ' + lead.callCount + '×</span>';
        if (isWdv) html += '<span class="tag wdv">WDV fällig</span>';
        else if (lead.wiedervorlage) html += '<span class="tag">' + lead.wiedervorlage + '</span>';
        html += '</div>';
        card.innerHTML = html;

        var noteEl = card.querySelector(".lead-note");
        if (noteEl) {
          noteEl.addEventListener("click", function(e){
            e.stopPropagation();
            var existing = document.getElementById("note-popup");
            if (existing) { existing.remove(); return; }
            var popup = document.createElement("div");
            popup.id = "note-popup";
            popup.textContent = noteEl.dataset.note;
            var rect = noteEl.getBoundingClientRect();
            popup.style.top = (rect.bottom + 8) + "px";
            popup.style.left = Math.min(rect.left, window.innerWidth - 340) + "px";
            document.body.appendChild(popup);
            setTimeout(function(){
              document.addEventListener("click", function close(ev){
                if (!popup.contains(ev.target)) { popup.remove(); document.removeEventListener("click", close); }
              });
            }, 0);
          });
        }

        body.appendChild(card);
      });

      colEl.appendChild(body);
      board.appendChild(colEl);
    });
  }

  document.getElementById("search").addEventListener("input", function(e){
    search = e.target.value.trim();
    render();
  });

  render();
})();
</script>

</body>
</html>
